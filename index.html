  <body>
    <div id="app">
      <!-- Loading fallback -->
      <div id="app-loading" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; color: #64748b;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10" opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" opacity="0.75"/>
        </svg>
        <p style="margin-top: 1rem; font-size: 0.875rem;">Loading Noveris Blog...</p>
      </div>
    </div>

    <!-- Global error handler -->
    <script>
      // Remove loading indicator once app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loading = document.getElementById('app-loading');
          if (loading && document.getElementById('app').children.length > 1) {
            loading.style.display = 'none';
          }
        }, 1000);
      });

      // Track failed resources to prevent infinite reload loops
      var failedResources = [];
      var reloadAttempts = parseInt(sessionStorage.getItem('reloadAttempts') || '0');
      var maxReloadAttempts = 1;

      // Detect script loading failures
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          var failedUrl = e.target.src || e.target.href;
          console.error('Resource failed to load:', failedUrl);
          failedResources.push(failedUrl);

          // Auto-retry with cache bypass on first failure
          if (reloadAttempts < maxReloadAttempts) {
            reloadAttempts++;
            sessionStorage.setItem('reloadAttempts', reloadAttempts.toString());
            console.log('Attempting cache-busting reload (attempt ' + reloadAttempts + ')...');
            setTimeout(function() {
              window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
            }, 500);
            return;
          }

          // Clear retry counter after showing error
          sessionStorage.removeItem('reloadAttempts');

          // Show error message after retry failed
          var loading = document.getElementById('app-loading');
          if (loading) {
            loading.innerHTML = '<div style="text-align: center; padding: 2rem;"><h2 style="color: #ef4444; margin-bottom: 1rem;">⚠️ Loading Error</h2><p style="color: #64748b; margin-bottom: 1rem;">Failed to load required resources.</p><p style="color: #94a3b8; font-size: 0.875rem; margin-bottom: 1rem;">This is likely due to cached content. Try hard refresh:</p><div style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem;"><button onclick="sessionStorage.removeItem(\'reloadAttempts\'); window.location.href = window.location.href.split(\'?\')[0] + \'?v=\' + Date.now()" style="padding: 0.5rem 1rem; background: #0d9488; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; font-weight: 500;">Clear Cache & Reload</button><button onclick="sessionStorage.removeItem(\'reloadAttempts\'); window.location.reload(true)" style="padding: 0.5rem 1rem; background: #64748b; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem;">Force Refresh</button></div><p style="color: #94a3b8; font-size: 0.75rem; margin-top: 1rem;">Or press: <kbd style="background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-family: monospace;">Ctrl+Shift+R</kbd> (Windows) / <kbd style="background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-family: monospace;">Cmd+Shift+R</kbd> (Mac)</p><br><a href="/" onclick="sessionStorage.removeItem(\'reloadAttempts\')" style="color: #0d9488; text-decoration: none; font-size: 0.875rem;">← Back to Home</a></div>';
          }
        }
      }, true);

      // Clear reload counter on successful load
      window.addEventListener('load', function() {
        sessionStorage.removeItem('reloadAttempts');
      });
    </script>

    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }

    <!-- Service Worker Registration -->
    <script>
      // 企业级 Service Worker 注册和管理
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('[SW] Service Worker registered successfully:', registration.scope);

              // 监听 Service Worker 更新
              registration.addEventListener('updatefound', function() {
                const newWorker = registration.installing;
                console.log('[SW] New service worker found, installing...');

                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[SW] New content available, prompting user...');
                    // 新版本可用，提示用户刷新
                    if (confirm('网站有新版本可用，是否立即更新？\n\nA new version is available. Update now?')) {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload(true);
                    }
                  }
                });
              });

              // 监听控制器变更（Service Worker 激活）
              navigator.serviceWorker.addEventListener('controllerchange', function() {
                console.log('[SW] Controller changed, reloading page...');
                window.location.reload(true);
              });
            })
            .catch(function(error) {
              console.error('[SW] Service Worker registration failed:', error);
            });

          // 监听来自 Service Worker 的消息
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'CACHE_CLEARED') {
              console.log('[SW] Cache cleared:', event.data.message);
            }
          });
        });
      }

      // 添加全局缓存清除函数（用于调试）
      window.clearAppCache = function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHE' });
          // 同时清除浏览器缓存
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) {
                caches.delete(name);
              });
            }).then(function() {
              console.log('[Cache] All caches cleared, reloading...');
              window.location.reload(true);
            });
          }
        } else {
          // 强制刷新
          window.location.reload(true);
        }
      };

      // 版本检查函数
      window.checkVersion = async function() {
        try {
          const response = await fetch('/health.json?' + Date.now());
          const health = await response.json();
          console.log('[Health] Service status:', health);
          return health;
        } catch (error) {
          console.error('[Health] Failed to check version:', error);
          return null;
        }
      };
    </script>

    <script type="module" src="/src/main.ts"></script>
