name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # 允许推送到仓库
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup dist directory
        run: |
          cp docs/index.html docs/404.html
          touch docs/.nojekyll

          # 生成详细的构建信息
          echo "Build completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > docs/build-info.txt
          echo "Commit: ${{ github.sha }}" >> docs/build-info.txt
          echo "Commit Message: $(git log -1 --pretty=%B)" >> docs/build-info.txt
          echo "Build number: ${{ github.run_number }}" >> docs/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> docs/build-info.txt
          echo "Triggered by: ${{ github.event_name }}" >> docs/build-info.txt
          echo "Repository: ${{ github.repository }}" >> docs/build-info.txt

          # 更新健康检查文件的时间戳
          if [ -f docs/health.json ]; then
            sed -i.bak "s/\"timestamp\": \"[^\"]*\"/\"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"/" docs/health.json
            rm docs/health.json.bak 2>/dev/null || true
          fi

          # 验证关键文件存在
          echo "Verifying build output..."
          test -f docs/index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f docs/manifest.json || (echo "ERROR: manifest.json not found" && exit 1)
          test -f docs/sw.js || (echo "ERROR: sw.js not found" && exit 1)
          test -f docs/health.json || (echo "ERROR: health.json not found" && exit 1)

          # 列出构建输出
          echo "Build output files:"
          ls -lah docs/
          echo "Assets:"
          ls -lah docs/assets/ | head -20

          echo "Build verification completed successfully"

      - name: Commit docs to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Deploy: Build #${{ github.run_number }} from ${{ github.sha }}" || echo "No changes to commit"
          git push
