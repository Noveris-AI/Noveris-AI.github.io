name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # 允许推送到仓库
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to root directory
        run: |
          # Copy built files to root for GitHub Pages user site deployment
          cp -r dist/* .
          cp dist/index.html 404.html
          touch .nojekyll

          # 更新健康检查文件的时间戳
          if [ -f health.json ]; then
            sed -i.bak "s/\"timestamp\": \"[^\"]*\"/\"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"/" health.json
            rm health.json.bak 2>/dev/null || true
          fi

          # 生成构建信息
          echo "Build completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > build-info.txt
          echo "Commit: ${{ github.sha }}" >> build-info.txt
          echo "Build number: ${{ github.run_number }}" >> build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> build-info.txt

          # 验证关键文件存在
          echo "Verifying build output..."
          test -f index.html || (echo "ERROR: index.html not found" && exit 1)
          test -f manifest.json || (echo "ERROR: manifest.json not found" && exit 1)
          test -f sw.js || (echo "ERROR: sw.js not found" && exit 1)
          test -f 404.html || (echo "ERROR: 404.html not found" && exit 1)

          echo "Build verification completed successfully"

      - name: Commit to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy: Build #${{ github.run_number }} from ${{ github.sha }}" || echo "No changes to commit"
          git push
