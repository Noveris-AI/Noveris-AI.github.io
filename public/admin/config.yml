backend:
  name: github
  repo: Noveris-AI/Noveris-AI.github.io
  branch: main

# 本地测试模式（可选）
# local_backend: true

# 媒体文件存储
media_folder: public/images/posts
public_folder: /images/posts

# 编辑器设置
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

# 内容集合
collections:
  # 分类
  - name: categories
    label: Categories
    label_singular: Category
    folder: content/categories
    create: true
    slug: "{{slug}}"
    identifier_field: name
    extension: json
    format: json
    fields:
      - { label: "Name (English)", name: "name", widget: "string" }
      - { label: "Name (Chinese)", name: "nameZh", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Icon (Emoji)", name: "icon", widget: "string" }
      - { label: "Color", name: "color", widget: "color", default: "#0d9488" }

  # 文章
  - name: posts
    label: Posts
    label_singular: Post
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title (English)", name: "title", widget: "string" }
      - { label: "Title (Chinese)", name: "titleZh", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Excerpt (English)", name: "excerpt", widget: "text" }
      - { label: "Excerpt (Chinese)", name: "excerptZh", widget: "text" }
      - { label: "Content (English)", name: "content", widget: "markdown" }
      - { label: "Content (Chinese)", name: "contentZh", widget: "markdown" }
      - { label: "Category", name: "category", widget: "relation", collection: "categories", search_fields: ["name"], value_field: "slug", display_fields: ["name"] }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Read Time (minutes)", name: "readTime", widget: "number", default: 5, value_type: "int" }
      - { label: "Published Date", name: "publishedAt", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", default: "" }
      - { label: "Likes", name: "likes", widget: "number", default: 0, value_type: "int", required: false }
